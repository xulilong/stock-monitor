<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙哥的股票监控看板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #e94560;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5em;
            color: #e94560;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #a0a0a0;
            font-size: 1.1em;
        }
        
        .update-time {
            background: rgba(233, 69, 96, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 15px;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .card-title {
            font-size: 1.5em;
            color: #e94560;
        }
        
        .signal-badge {
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.9em;
            font-weight: bold;
        }
        
        .signal-high {
            background: rgba(233, 69, 96, 0.3);
            color: #e94560;
        }
        
        .signal-medium {
            background: rgba(255, 193, 7, 0.3);
            color: #ffc107;
        }
        
        .signal-low {
            background: rgba(158, 158, 158, 0.3);
            color: #9e9e9e;
        }
        
        .stock-list {
            list-style: none;
        }
        
        .stock-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #e94560;
            transition: all 0.3s ease;
        }
        
        .stock-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }
        
        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .stock-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #fff;
        }
        
        .stock-code {
            color: #a0a0a0;
            font-size: 0.9em;
            margin-left: 10px;
        }
        
        .stock-score {
            background: #e94560;
            color: #fff;
            padding: 5px 12px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.9em;
        }
        
        .stock-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            font-size: 0.9em;
        }
        
        .info-label {
            color: #a0a0a0;
            margin-right: 8px;
        }
        
        .info-value {
            color: #fff;
            font-weight: 500;
        }
        
        .price-up {
            color: #4caf50;
        }
        
        .price-down {
            color: #f44336;
        }
        
        .signals {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .signal-tag {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.85em;
        }
        
        .section-title {
            font-size: 1.8em;
            color: #e94560;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(233, 69, 96, 0.3);
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #e94560;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #a0a0a0;
            font-size: 0.9em;
        }
        
        .auto-refresh {
            text-align: center;
            padding: 20px;
            color: #a0a0a0;
            font-size: 0.9em;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #a0a0a0;
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #e94560;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .sector-tag {
            display: inline-block;
            background: rgba(0, 188, 212, 0.2);
            color: #00bcd4;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.8em;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 龙哥的股票监控看板</h1>
            <p class="subtitle">热点分析 + 主力入场信号实时监控</p>
            <div class="update-time">
                🕐 最后更新：<span id="lastUpdate">加载中...</span>
            </div>
        </header>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>正在加载数据...</p>
        </div>
        
        <div id="dashboard" class="dashboard" style="display: none;">
            <!-- 统计卡片 -->
            <div class="card full-width">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalStocks">0</div>
                        <div class="stat-label">监控股票</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="highSignals">0</div>
                        <div class="stat-label">强烈信号 (60 分+)</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="mediumSignals">0</div>
                        <div class="stat-label">重点关注 (40-60 分)</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="lowSignals">0</div>
                        <div class="stat-label">一般关注 (20-40 分)</div>
                    </div>
                </div>
            </div>
            
            <!-- 强烈信号 -->
            <div class="card full-width">
                <div class="card-header">
                    <h2 class="card-title">🔴 强烈信号 (60 分+)</h2>
                    <span class="signal-badge signal-high" id="highCount">0 个</span>
                </div>
                <ul class="stock-list" id="highSignalsList">
                    <li class="loading">暂无数据</li>
                </ul>
            </div>
            
            <!-- 重点关注 -->
            <div class="card full-width">
                <div class="card-header">
                    <h2 class="card-title">🟡 重点关注 (40-60 分)</h2>
                    <span class="signal-badge signal-medium" id="mediumCount">0 个</span>
                </div>
                <ul class="stock-list" id="mediumSignalsList">
                    <li class="loading">暂无数据</li>
                </ul>
            </div>
            
            <!-- 一般关注 -->
            <div class="card full-width">
                <div class="card-header">
                    <h2 class="card-title">⚪ 一般关注 (20-40 分)</h2>
                    <span class="signal-badge signal-low" id="lowCount">0 个</span>
                </div>
                <ul class="stock-list" id="lowSignalsList">
                    <li class="loading">暂无数据</li>
                </ul>
            </div>
        </div>
        
        <div class="auto-refresh">
            🔄 数据每 5 分钟自动刷新 | 数据源：腾讯财经 API
        </div>
    </div>
    
    <script>
        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('./data/stock-monitor-data.json?t=' + Date.now());
                if (!response.ok) {
                    throw new Error('数据加载失败');
                }
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('loading').innerHTML = '<p>数据加载失败，请确保监控脚本正在运行</p>';
            }
        }
        
        // 渲染看板
        function renderDashboard(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'grid';
            
            // 更新时间
            const now = new Date();
            document.getElementById('lastUpdate').textContent = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            
            // 统计数据
            const totalStocks = data.totalStocks || 103;
            const highSignals = data.signals.filter(s => s.score >= 60);
            const mediumSignals = data.signals.filter(s => s.score >= 40 && s.score < 60);
            const lowSignals = data.signals.filter(s => s.score >= 20 && s.score < 40);
            
            document.getElementById('totalStocks').textContent = totalStocks;
            document.getElementById('highSignals').textContent = highSignals.length;
            document.getElementById('mediumSignals').textContent = mediumSignals.length;
            document.getElementById('lowSignals').textContent = lowSignals.length;
            
            document.getElementById('highCount').textContent = highSignals.length + '个';
            document.getElementById('mediumCount').textContent = mediumSignals.length + '个';
            document.getElementById('lowCount').textContent = lowSignals.length + '个';
            
            // 渲染信号列表
            renderSignalList('highSignalsList', highSignals);
            renderSignalList('mediumSignalsList', mediumSignals);
            renderSignalList('lowSignalsList', lowSignals);
        }
        
        // 渲染信号列表
        function renderSignalList(containerId, signals) {
            const container = document.getElementById(containerId);
            
            if (signals.length === 0) {
                container.innerHTML = '<li class="loading">暂无信号</li>';
                return;
            }
            
            // 按评分排序
            signals.sort((a, b) => b.score - a.score);
            
            container.innerHTML = signals.map(stock => `
                <li class="stock-item">
                    <div class="stock-header">
                        <div>
                            <span class="stock-name">${stock.stockName}</span>
                            <span class="stock-code">${stock.code}</span>
                            <span class="sector-tag">${stock.sector}</span>
                        </div>
                        <span class="stock-score">${stock.score}分</span>
                    </div>
                    <div class="stock-info">
                        <div class="info-item">
                            <span class="info-label">💰 当前价:</span>
                            <span class="info-value ${stock.changePercent >= 0 ? 'price-up' : 'price-down'}">
                                ¥${stock.current.toFixed(2)}
                            </span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">📈 涨跌:</span>
                            <span class="info-value ${stock.changePercent >= 0 ? 'price-up' : 'price-down'}">
                                ${stock.changePercent >= 0 ? '+' : ''}${stock.changePercent.toFixed(2)}%
                            </span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">🎯 目标价:</span>
                            <span class="info-value">¥${(stock.current * 1.05).toFixed(2)}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">🛑 止损位:</span>
                            <span class="info-value">¥${(stock.current * 0.94).toFixed(2)}</span>
                        </div>
                    </div>
                    <div class="signals">
                        ${stock.signals.map(s => `<span class="signal-tag">${s.level} ${s.type}</span>`).join('')}
                    </div>
                </li>
            `).join('');
        }
        
        // 初始加载
        loadData();
        
        // 每 5 分钟自动刷新
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
